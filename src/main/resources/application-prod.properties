## Allow multiple env var sources: SPRING_DATASOURCE_URL (preferred), then JDBC_DATABASE_URL, then DATABASE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_URL:}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false
spring.thymeleaf.cache=true

# Render provides DATABASE_URL in the form: postgres://user:pass@host:port/db
# If DATABASE_URL is used, a custom DataSource bean will parse it into a JDBC URL.
server.port=${PORT:8080}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
