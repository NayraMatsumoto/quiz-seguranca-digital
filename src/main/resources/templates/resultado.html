<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <title>Resultado do Quiz Corporativo</title>
</head>
<body class="app-shell">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-11">
                <div class="card glass-card rounded-5 border-0 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                            <div>
                                <div class="text-uppercase text-soft small fw-semibold mb-2">Resultado final</div>
                                <h1 class="display-6 fw-bold title-xl mb-2" th:text="${aluno.nome}"></h1>
                                <p class="text-soft mb-0">Veja seu desempenho e revise o gabarito comentado para consolidar o aprendizado.</p>
                            </div>

                            <div class="score-pill p-3 rounded-4 text-center">
                                <div class="small text-soft">Pontuação</div>
                                <div class="fs-2 fw-bold lh-1" th:text="${pontuacao}"></div>
                                <div class="small text-soft">de <span th:text="${total}"></span></div>
                            </div>
                        </div>

                        <div class="d-flex flex-wrap gap-2 mb-4">
                            <span class="badge rounded-pill text-bg-success" th:if="${pontuacao >= 4}">Desempenho excelente</span>
                            <span class="badge rounded-pill text-bg-warning text-dark" th:if="${pontuacao == 3}">Bom desempenho</span>
                            <span class="badge rounded-pill text-bg-danger" th:if="${pontuacao <= 2}">Pode melhorar</span>
                            <span class="badge rounded-pill text-bg-light text-dark">Feedback pedagógico</span>
                        </div>

                        <div class="summary-card rounded-4 p-4">
                            <p class="mb-0 fs-5" th:text="${mensagem}"></p>
                        </div>
                    </div>
                </div>

                <div class="card glass-card rounded-5 border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 fw-bold mb-3">Gabarito comentado</h2>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                <tr>
                                    <th>Pergunta</th>
                                    <th>Resposta marcada</th>
                                    <th>Correta</th>
                                    <th>Explicação</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="item : ${resumo}">
                                    <td class="fw-semibold" th:text="${item.enunciado()}"></td>
                                    <td th:with="acertou=${item.respostaMarcada() eq item.respostaCorreta()}">
                                        <div class="d-flex flex-column gap-2">
                                            <div class="resposta-linha">
                                                <span class="badge rounded-pill"
                                                      th:classappend="${acertou} ? ' text-bg-success' : ' text-bg-danger'"
                                                      th:text="${item.respostaMarcada()}"></span>
                                                <span class="text-soft" th:text="${item.textoRespostaMarcada()}"></span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge rounded-pill text-bg-success" th:text="${item.respostaCorreta()}"></span>
                                    </td>
                                    <td class="text-soft" th:text="${item.explicacao()}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <a class="btn btn-gradient btn-lg mt-4" th:href="@{/}">Fazer novo quiz</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
