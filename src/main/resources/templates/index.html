<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <title>Quiz de Segurança Corporativa</title>
</head>
<body class="app-shell">
    <div class="container py-5 min-vh-100 d-flex align-items-center">
        <div class="row g-4 align-items-center justify-content-center w-100">
            <div class="col-12 col-lg-6">
                <div class="pe-lg-4">
                    <span class="hero-badge mb-3">Segurança para o setor administrativo</span>
                    <h1 class="display-5 fw-bold title-xl mb-3">Quiz de Segurança Corporativa</h1>
                    <p class="lead text-soft mb-4">
                        Uma experiência moderna para treinar boas práticas de proteção de dados, documentos, e-mail e navegação.
                    </p>

                    <div class="d-flex flex-wrap gap-2 mb-4">
                        <span class="badge rounded-pill text-bg-light text-dark">Banco com até 20 perguntas</span>
                        <span class="badge rounded-pill text-bg-light text-dark">5 perguntas por rodada</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-9 col-lg-5">
                <div class="card glass-card rounded-5 border-0">
                    <div class="card-body p-4 p-md-5">
                            <div class="d-flex align-items-center justify-content-between mb-4">
                            <div>
                                <div class="text-uppercase text-soft small fw-semibold">Comece agora</div>
                                <h2 class="h4 mb-0">Entrar no quiz</h2>
                            </div>
                        </div>

                        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                        <form th:action="@{/iniciar}" th:object="${alunoInicioDto}" method="post">
                            <div class="mb-3">
                                <label for="nome" class="form-label text-soft">Nome</label>
                                <input id="nome" type="text" class="form-control form-control-lg" th:field="*{nome}" placeholder="Digite seu nome">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="idade" class="form-label text-soft">Idade</label>
                                <input id="idade" type="number" class="form-control form-control-lg" th:field="*{idade}" placeholder="Ex: 14">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('idade')}" th:errors="*{idade}"></div>
                            </div>
                            <button class="btn btn-gradient btn-lg w-100" type="submit">Iniciar Quiz</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
