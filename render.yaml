services:
  - type: web
    name: quiz-seguranca-digital-web
    env: docker
    plan: free
    repo: https://github.com/NayraMatsumoto/quiz-seguranca-digital
    branch: main
    buildCommand: mvn -DskipTests package
    startCommand: sh -lc 'java -Dserver.port=$PORT -jar target/*.jar'
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    healthCheckPath: /actuator/health

databases:
  - name: quiz-db
    engine: postgres
    plan: starter
    region: oregon
